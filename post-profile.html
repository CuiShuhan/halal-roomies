<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Post a referral — Roomdrop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&family=Lora:ital,wght@0,500;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="hero-page">
      <header class="site-header site-header--transparent">
        <div class="site-header__inner">
          <a class="logo" href="index.html">
            <img class="logo__mark" src="images/guide-mascot.png" width="34" height="34" alt="" />
            Roomdrop
          </a>
          <nav class="nav-main" aria-label="Primary">
            <a href="index.html">Home</a>
            <a href="apartments.html">Apartments</a>
            <a href="roommate-matching.html" aria-current="page">Referral</a>
          </nav>
          <div class="header-actions">
            <a class="btn btn--outline" href="signup.html">Sign Up</a>
            <a class="btn btn--primary" href="login.html">Log In</a>
          </div>
        </div>
      </header>

      <section class="page-hero hero" aria-labelledby="pp-title">
        <div
          class="hero__bg"
          style="background-image: url('https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=1600&q=80')"
        ></div>
        <div class="hero__overlay" aria-hidden="true"></div>
        <div class="hero__inner" style="padding-top: 5rem; padding-bottom: 3rem">
          <h1 id="pp-title" class="page-title">Post a referral</h1>
          <p class="page-lead">Share apartment referral details so others can reach you.</p>
        </div>
      </section>
    </div>

    <div class="form-shell form-shell--wide">
      <p
        id="referral-script-error"
        class="listing-script-error"
        role="alert"
        style="display: none; margin: 0 0 1rem; padding: 0.75rem 1rem; border-radius: var(--radius, 12px); background: #fff3cd; color: #664d03; font-size: 0.9rem"
      >
        Referrals script failed to load. Hard-refresh the page (Cmd+Shift+R).
      </p>
      <form id="referral-form" class="form-card" action="roommate-matching.html" method="get">
        <h2 class="form-section-title">Your contact</h2>
        <div class="form-grid">
          <label class="field">
            Name
            <input type="text" name="name" autocomplete="name" required />
          </label>
          <label class="field">
            Phone number
            <input type="text" name="phone" placeholder="Not available" autocomplete="tel" />
            <span class="field__hint">You can enter <strong>Not available</strong> if you prefer not to share.</span>
          </label>
          <label class="field">
            Email
            <input type="text" name="email" placeholder="Not available" autocomplete="email" />
            <span class="field__hint">You can enter <strong>Not available</strong> if you prefer not to share.</span>
          </label>
          <label class="field">
            Note
            <textarea name="note" rows="3" placeholder="How others can find you — e.g. Facebook name"></textarea>
            <span class="field__hint">Optional. Add how people should contact or identify you.</span>
          </label>
        </div>

        <hr style="border: none; border-top: 1px solid var(--border); margin: 2rem 0" />

        <h2 class="form-section-title">Apartment</h2>
        <div class="form-grid form-grid--2">
          <label class="field">
            Apartment name
            <input type="text" name="apartment_name" required />
          </label>
          <label class="field">
            Apartment location
            <input type="text" name="apartment_location" placeholder="City, neighborhood, or address" required />
          </label>
        </div>

        <button type="submit" class="btn btn--primary btn--block btn--lg" style="margin-top: 2rem">Post referral</button>
      </form>
    </div>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <nav class="footer-links" aria-label="Footer">
          <a href="#">About</a>
          <a href="#">Help</a>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Service</a>
        </nav>
        <div class="footer-bottom">
          <div>https://www.getroomdrop.com</div>
          <div class="social" aria-label="Social">
            <a href="#" aria-label="Instagram">◎</a>
            <a href="#" aria-label="Facebook">f</a>
            <a href="#" aria-label="X">𝕏</a>
          </div>
        </div>
      </div>
    </footer>
    <script src="js/vendor/supabase.min.js?v=8"></script>
    <script src="js/supabase-init.js?v=8"></script>
    <script src="js/auth.js?v=9"></script>
    <script src="js/header-auth.js?v=9"></script>
    <script src="js/referrals-store.js?v=1"></script>
    <script src="js/referrals-remote.js?v=1"></script>
    <script>
      (function () {
        function startForm() {
          var form = document.getElementById("referral-form");
          var warn = document.getElementById("referral-script-error");
          if (!form) return;

          if (!window.HalalRoomiesReferrals) {
            if (warn) warn.style.display = "block";
            return;
          }

          form.addEventListener("submit", function (e) {
            e.preventDefault();
            if (!HalalRoomiesReferrals.saveReferralAsync) return;
            var fd = new FormData(form);
            var name = (fd.get("name") || "").toString().trim();
            var apartmentName = (fd.get("apartment_name") || "").toString().trim();
            if (!name || !apartmentName) return;

            var submitBtn = form.querySelector('button[type="submit"]');
            if (submitBtn) {
              submitBtn.disabled = true;
              submitBtn.textContent = "Posting…";
            }

            HalalRoomiesReferrals.saveReferralAsync(fd)
              .then(function () {
                window.location.href = "roommate-matching.html";
              })
              .catch(function (err) {
                console.error(err);
                if (submitBtn) {
                  submitBtn.disabled = false;
                  submitBtn.textContent = "Post referral";
                }
                var msg = (err && err.message) || "Could not save referral.";
                alert(msg + " Check your connection and try again.");
              });
          });
        }

        if (!window.HalalAuth) {
          window.location.replace("login.html?next=" + encodeURIComponent("post-profile.html"));
          return;
        }
        HalalAuth.requireAuth().then(function (session) {
          if (session) startForm();
        });
      })();
    </script>
  </body>
</html>
